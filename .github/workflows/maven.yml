# on:
#   push:
#     branches: [ "master" ]
#   pull_request:
#     branches: [ "master" ]
name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: mvn -B clean javafx:jlink --file pom.xml
    - name: Package with jpackage
      run: |
           jpackage \
           --dest target \
           --runtime-image target/app \
           --name "JDK8+ CertImporter" \
           --module io.github.kambaa.javafxdemo/io.github.kambaa.javafxdemo.JavaFxApplication \
           --type app-image \
           --icon src/main/resources/icon.png
    - name: Zip packaged app
      run: |
          cd target
          zip -r "JDK8+ CertImporter.zip" "JDK8+ CertImporter"
    - name: List Generated Application Datas
      run: |
          cd target
          ls -la
    - name: Upload release asset
      uses: softprops/action-gh-release@v2
      with:
        files: "target/JDK8+ CertImporter.zip"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}      


    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
